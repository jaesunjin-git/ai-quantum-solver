# reference_ranges.yaml — Logistics domain parameter defaults by sub-domain

last_mile:
  max_driving_min:
    default: 480
    typical_range: [360, 600]
    unit: 분
    description: 라스트마일 기사 일일 최대 운전시간
  max_work_min:
    default: 600
    typical_range: [480, 720]
    unit: 분
    description: 라스트마일 기사 일일 최대 근무시간
  max_stops:
    default: 60
    typical_range: [30, 80]
    unit: 건
    description: 라스트마일 기사 일일 최대 배송건수
  continuous_driving_limit:
    default: 180
    typical_range: [120, 240]
    unit: 분
  min_break_min:
    default: 20
    typical_range: [15, 30]
    unit: 분
  capacity_kg:
    default: 1500
    typical_range: [1000, 3000]
    unit: kg
  capacity_cbm:
    default: 12
    typical_range: [8, 20]
    unit: CBM

line_haul:
  max_driving_min:
    default: 540
