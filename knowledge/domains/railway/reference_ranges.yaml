  cleanup_time_minutes: {range: [30, 60]}
  min_break_minutes: {range: [30, 60]}
  night_rest_minutes: {range: [480, 600]}

freight:
  description: "화물철도 일반적 범위"
  max_driving_minutes: {range: [360, 540]}
  max_work_minutes: {range: [600, 840]}
