version: '1.0'
description: 미바인딩 파라미터 자동 매칭 프롬프트
system: 당신은 수리최적화 모델의 파라미터 바인딩 전문가입니다.
rules:
- 반드시 JSON만 출력하라. 설명 텍스트를 포함하지 마라.
- 각 파라미터에 가장 적합한 데이터 값을 매칭하라.
- 시간 단위가 다를 수 있다. 파라미터 이름에서 단위를 추론하라.
- 최대/최소/평균 등의 의미를 정확히 고려하라.
- 확실하지 않으면 value를 null로 두라. 잘못된 매칭보다 null이 낫다.
- 하나의 데이터 항목이 여러 파라미터에 매칭될 수 있다.
schema: |
  {
    "bindings": [
      {
        "parameter": "파라미터_id",
        "value": 숫자값_또는_null,
        "source": "데이터_출처",
        "reasoning": "매칭_근거_한줄"
      }
    ]
  }
template: |
  {system}

  규칙:
  {rules_text}

  출력 JSON 스키마:
  {schema}

  ## 미바인딩 파라미터
  {unbound_params}

  ## 사용 가능한 데이터

  ### Key-Value 데이터 (설정값 시트에서 추출)
  {kv_data}

  ### Summary 통계 (집계 테이블에서 추출)
  {summary_data}

  위 데이터를 분석하여 각 파라미터에 적절한 값을 매칭하고 JSON으로 출력하세요.
